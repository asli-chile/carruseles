<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Stacked - ASLI</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <main>
    <div class="content">
      <h1>ASLI Logística</h1>
      <p>
        Gestiona tu logística internacional de punta a ponta para que exportes 
        e importes con tiempos predecibles, menor riesgo operativo y control real 
        de cada embarque. Compromiso: respuesta en menos de 2 horas.
      </p>
      <button class="btn">Ver Servicios</button>
    </div>

    <div class="stack" id="cardStack">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=800&q=80" alt="Buque portacontenedores">
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1494412574643-ff11b0a5c1c3?w=800&q=80" alt="Operación portuaria">
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1578575437130-527eed3abbec?w=800&q=80" alt="Contenedores">
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1580674684081-7617fbf3d745?w=800&q=80" alt="Camión de carga">
      </div>
      <div class="card">
        <img src="https://images.unsplash.com/photo-1553413077-190dd305871c?w=800&q=80" alt="Avión de carga">
      </div>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1580674684081-7617fbf3d745?w=800&q=80" alt="Camión de carga">
      </div>
    </div>
  </main>

  <script src="carousel.js"></script>
</body>
</html>
