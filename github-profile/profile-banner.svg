<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Banner terminal ASLI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020403"/>
      <stop offset="55%" stop-color="#071207"/>
      <stop offset="100%" stop-color="#0c1a0c"/>
    </linearGradient>
    <pattern id="scan" width="1200" height="3" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" fill="#000000" opacity="0.35"/>
      <rect y="1" width="1200" height="2" fill="transparent"/>
    </pattern>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a3d1a" stroke-width="0.5" opacity="0.45"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.35"/>
  <rect width="1200" height="300" fill="url(#scan)" opacity="0.22"/>

  <!-- Marco tipo CRT -->
  <rect x="24" y="20" width="1152" height="260" rx="4" fill="none" stroke="#1f4d1f" stroke-width="1"/>
  <rect x="32" y="28" width="1136" height="244" rx="2" fill="none" stroke="#33ff33" stroke-width="2" opacity="0.85" filter="url(#glow)"/>

  <!-- Esquinas decorativas -->
  <path fill="none" stroke="#66ff66" stroke-width="3" d="M 52 48 h 36 M 52 48 v 36 M 1148 48 h -36 M 1148 48 v 36 M 52 252 h 36 M 52 252 v -36 M 1148 252 h -36 M 1148 252 v -36"/>

  <!-- Título -->
  <text x="600" y="118" text-anchor="middle" fill="#143214" font-family="Consolas, 'Courier New', monospace" font-size="52" font-weight="700">T.A.P.T.</text>
  <text x="600" y="118" text-anchor="middle" fill="#33ff33" font-family="Consolas, 'Courier New', monospace" font-size="52" font-weight="700" filter="url(#softGlow)">T.A.P.T.</text>

  <text x="600" y="158" text-anchor="middle" fill="#55dd55" font-family="Consolas, 'Courier New', monospace" font-size="20" letter-spacing="6">T E R M I N A L · T Á C T I C A · P E R S O N A L</text>

  <text x="600" y="200" text-anchor="middle" fill="#7fff7f" font-family="Consolas, 'Courier New', monospace" font-size="17">NODO ASLI · RASTREO LOGÍSTICO · CHILE</text>

  <text x="600" y="242" text-anchor="middle" fill="#3faa3f" font-family="Consolas, 'Courier New', monospace" font-size="14" opacity="0.9">[ SISTEMA EN LÍNEA · CANAL SEGURO · DOCUMENTACIÓN DISPONIBLE ]</text>

  <!-- Barra inferior estilo medidor -->
  <rect x="120" y="268" width="960" height="6" fill="#061206" stroke="#226622" stroke-width="1"/>
  <rect x="120" y="268" width="720" height="6" fill="#33ff33" opacity="0.35"/>
</svg>
